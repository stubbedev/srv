name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Collapse the duplicate push + pull_request runs for the same commit into one,
# and cancel a superseded run when a branch is force-pushed. Keyed on the head
# SHA so the push-event and pull_request-event runs share a group.
concurrency:
  group: ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  autofix:
    # Attempt to auto-correct mechanically-fixable issues (gofmt + golangci-lint --fix).
    # If anything was fixed, commit and push back so subsequent jobs (which re-checkout)
    # validate the fixed tree. Skipped on bot-authored commits to prevent loops, and
    # on PRs from forks where pushing back is impossible.
    if: github.event.pusher.name != 'github-actions[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      pushed_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Use ref/ref_name so we check out the actual branch (not detached HEAD)
          # so `git push` has somewhere to go.
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run gofmt -w
        run: gofmt -w .

      - name: Run golangci-lint --fix
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --fix
        continue-on-error: true

      - name: Regenerate schemas
        run: go run ./cmd/gen-schema

      - name: Regenerate CLI docs
        run: go run ./cmd/gen-docs

      - name: Regenerate README
        run: go run ./cmd/gen-readme

      - name: Commit and push fixes
        id: commit
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No auto-fixable issues found."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "style: auto-fix gofmt and golangci-lint issues [skip ci]"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "::notice::CI auto-fixed formatting/lint issues and pushed commit $(git rev-parse --short HEAD)."

  test:
    needs: autofix
    if: always() && (needs.autofix.result == 'success' || needs.autofix.result == 'skipped')
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Unit tests mock docker (SwapComposeExec / SwapNewClient), so they
        # run daemon-free on macOS too — catching darwin build/behaviour
        # breakage (host-networking branches, doctor_unix, platform.IsLinux).
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          # Check out the immutable SHA (autofix's pushed commit if any, else the
          # triggering commit) rather than the branch name, so this read-only job
          # can't fail at checkout when auto-merge deletes the branch mid-run.
          ref: ${{ needs.autofix.outputs.pushed_sha || github.sha }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Check gofmt
        run: |
          out=$(gofmt -l $(go list -f '{{.Dir}}' ./...))
          if [ -n "$out" ]; then
            echo "Unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (with race detector)
        run: go test -race ./...

      - name: Verify schemas are up to date
        if: matrix.os == 'ubuntu-latest'
        run: |
          go run ./cmd/gen-schema
          if [ -n "$(git status --porcelain schemas/)" ]; then
            echo "schemas/ is out of date. Run 'just schemas' and commit."
            git --no-pager diff schemas/
            exit 1
          fi

      - name: Verify CLI docs are up to date
        if: matrix.os == 'ubuntu-latest'
        run: |
          go run ./cmd/gen-docs
          if [ -n "$(git status --porcelain docs/cli.md)" ]; then
            echo "docs/cli.md is out of date. Run 'just sync-docs' and commit."
            git --no-pager diff docs/cli.md
            exit 1
          fi

      - name: Verify README is up to date
        if: matrix.os == 'ubuntu-latest'
        run: |
          go run ./cmd/gen-readme
          if [ -n "$(git status --porcelain README.md)" ]; then
            echo "README.md is out of date. Run 'just sync-readme' and commit."
            git --no-pager diff README.md
            exit 1
          fi

  lint:
    needs: autofix
    if: always() && (needs.autofix.result == 'success' || needs.autofix.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Immutable SHA, not the branch name — survives a mid-run branch delete.
          ref: ${{ needs.autofix.outputs.pushed_sha || github.sha }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  nix:
    needs: autofix
    if: always() && (needs.autofix.result == 'success' || needs.autofix.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Immutable SHA so the job survives a mid-run branch delete. The master
          # auto-bump step pushes `HEAD:master` explicitly, so it works fine from
          # this (possibly detached) checkout; the write token is still required.
          ref: ${{ needs.autofix.outputs.pushed_sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock', '**/Cargo.lock', '**/go.sum') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
          gc-max-store-size-linux: 5G

      # Inline `just sync-flake`. Rewrites flake.nix's vendorHash to match the
      # current go.sum (and refreshes the `# go-sum:` cache line). On master
      # pushes the result is auto-committed (next step); on PRs we fail if it
      # would change anything, so reviewers see the drift instead of CI
      # silently masking it.
      - name: sync flake.nix vendorHash
        run: |
          set -euo pipefail
          GO_SUM_HASH=$(sha256sum go.sum | awk '{print $1}')
          SENTINEL="sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          sed -i -E 's|^(\s*vendorHash = )"sha256-[^"]*";|\1"'"$SENTINEL"'";|' flake.nix
          set +e
          OUT=$(nix build .#srv --no-link 2>&1)
          BUILD_STATUS=$?
          set -e
          NEW_HASH=$(printf '%s\n' "$OUT" | awk '/got:[[:space:]]*sha256-/ {print $2; exit}')
          if [ -z "$NEW_HASH" ]; then
            if [ "$BUILD_STATUS" = "0" ]; then
              echo "::error::sync-flake: nix build unexpectedly succeeded with sentinel hash"
              echo "$OUT"
              exit 1
            fi
            echo "$OUT"
            echo "::error::sync-flake: nix build did not print 'got: sha256-…'"
            exit 1
          fi
          sed -i -E 's|^(\s*vendorHash = )"sha256-[^"]*";|\1"'"$NEW_HASH"'";|' flake.nix
          if grep -q '^[[:space:]]*# go-sum:' flake.nix; then
            sed -i -E 's|^(\s*# go-sum:).*|\1 '"$GO_SUM_HASH"'|' flake.nix
          else
            sed -i -E 's|^(\s*vendorHash = )|            # go-sum: '"$GO_SUM_HASH"'\n\1|' flake.nix
          fi
          echo "sync-flake: vendorHash=$NEW_HASH go-sum=$GO_SUM_HASH"

      - name: assert flake.nix in sync (PR)
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git status --porcelain flake.nix)" ]; then
            echo "::error::flake.nix vendorHash is out of sync with go.sum. Run 'just sync-flake' locally and commit the result."
            git --no-pager diff flake.nix
            exit 1
          fi

      - name: auto-commit flake.nix bump (master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          if [ -z "$(git status --porcelain flake.nix)" ]; then
            echo "flake.nix already in sync; nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add flake.nix
          git commit -m 'chore: auto-bump flake.nix vendorHash [skip ci]'
          git push origin HEAD:master

      - run: nix flake check --print-build-logs

      # Push the master build's closure to the self-hosted xilo cache so nix
      # consumers tracking HEAD/master pull a prebuilt binary instead of
      # recompiling. Release tags are cached separately by release.yml. Only
      # runs on direct master pushes — PRs and feature branches don't populate
      # the cache.
      - name: Build package for cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: nix build .#srv -L --print-out-paths | tee /tmp/srv-outpaths

      - name: setup xilo
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: stubbedev/xilo@v1
        with:
          url: https://nix.stubbe.dev
          cache: default
          token: ${{ secrets.XILO_TOKEN }}

      - name: Push to xilo
        # Best-effort: a cache-push failure (e.g. a transient 504 from the
        # single-vCPU cache box on a large closure) must not redden master CI.
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        continue-on-error: true
        run: |
          xilo push default $(cat /tmp/srv-outpaths)
