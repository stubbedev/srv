name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: linux
            goarch: "386"
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildDate=${BUILD_DATE}"

          ARCH="${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then
            ARCH="${ARCH}v${{ matrix.goarm }}"
          fi
          STAGE="srv-${VERSION}-${{ matrix.goos }}-${ARCH}"
          mkdir -p "dist/$STAGE"

          env CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} \
            go build -trimpath -ldflags "$LDFLAGS" -o "dist/$STAGE/srv" .

          cp README.md LICENSE "dist/$STAGE/" 2>/dev/null || true

          cd dist
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          rm -rf "$STAGE"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: dist/srv-*.tar.gz*
          retention-days: 7

  cache:
    name: push nix build to xilo
    # Build the nix package for this tag and push its closure to the
    # self-hosted xilo cache (nix.stubbe.dev/c/default/default) so `nix run`/flake
    # consumers and the dotfiles substituter pull a prebuilt binary instead
    # of recompiling. Independent of the Go release artifacts above.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Build package
        run: nix build .#srv -L --print-out-paths | tee /tmp/srv-outpaths

      - name: setup xilo
        uses: stubbedev/xilo@v1
        with:
          url: https://nix.stubbe.dev
          cache: default
          token: ${{ secrets.XILO_TOKEN }}

      - name: Push to xilo
        # Best-effort: a cache-push failure (e.g. a transient 504 from the
        # single-vCPU cache box on a large closure) must not redden a release.
        # Retry with backoff, then give up softly.
        continue-on-error: true
        run: |
          for attempt in 1 2 3; do
            if xilo push default $(cat /tmp/srv-outpaths); then
              exit 0
            fi
            echo "::warning::xilo push attempt $attempt failed; retrying in $((attempt * 30))s"
            sleep $((attempt * 30))
          done
          echo "::warning::xilo push failed after 3 attempts; cache push is best-effort, continuing"

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Aggregate checksums.txt
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          # Combined checksums.txt for install.sh / convenience consumers.
          cat *.sha256 > checksums.txt
          ls -la
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

  bump-tap:
    name: bump homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Skip prereleases — only stable tags update the tap formula.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Read sha256 files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p sha
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern '*.sha256' \
            --dir sha
          extract() {
            awk '{print $1}' "sha/srv-${VERSION}-$1.tar.gz.sha256"
          }
          {
            echo "VERSION=${VERSION}"
            echo "SHA_DARWIN_ARM64=$(extract darwin-arm64)"
            echo "SHA_DARWIN_AMD64=$(extract darwin-amd64)"
            echo "SHA_LINUX_ARM64=$(extract linux-arm64)"
            echo "SHA_LINUX_AMD64=$(extract linux-amd64)"
          } >> "$GITHUB_ENV"

      - name: Check out homebrew tap
        uses: actions/checkout@v6
        with:
          repository: stubbedev/homebrew-srv
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Regenerate formula
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cat > tap/Formula/srv.rb <<EOF
          class Srv < Formula
            desc "Traefik + TLS + DNS edge layer for static, proxy, and container sites"
            homepage "https://github.com/stubbedev/srv"
            version "${VERSION}"
            license "MIT"

            depends_on "mkcert"

            on_macos do
              on_arm do
                url "https://github.com/stubbedev/srv/releases/download/v#{version}/srv-#{version}-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/stubbedev/srv/releases/download/v#{version}/srv-#{version}-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/stubbedev/srv/releases/download/v#{version}/srv-#{version}-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/stubbedev/srv/releases/download/v#{version}/srv-#{version}-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "srv"
            end

            # Lets users run \`brew services start srv\` to keep the watch
            # daemon running across reboots without invoking
            # \`srv daemon install\` manually. The two installers are
            # mutually exclusive — both register a launchd agent / systemd
            # user unit that runs the same Docker watcher, and would race
            # over container-attach events. The caveats below ask users
            # to pick one.
            service do
              run [opt_bin/"srv", "daemon", "start", "--foreground"]
              # KeepAlive only on unexpected exits — \`brew services stop\`
              # and \`srv daemon stop\` (clean exit 0) leave the daemon
              # down. Mirrors the plist \`srv daemon install\` writes so
              # behaviour matches across install paths.
              keep_alive successful_exit: false
              process_type :background
              log_path var/"log/srv.log"
              error_log_path var/"log/srv.log"
            end

            def caveats
              <<~CAVEATS
                srv needs Docker installed and running.

                To start the watch daemon in the background:
                  brew services start srv

                Or, without homebrew-services:
                  srv daemon install

                Don't enable both — they register competing launchd / systemd
                units that race over the same Docker watcher.

                First-time setup (Traefik, dnsmasq, mkcert CA, Docker network):
                  srv install
              CAVEATS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/srv version")
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/srv.rb; then
            echo "Formula already up to date for ${VERSION}; nothing to do."
            exit 0
          fi
          git add Formula/srv.rb
          git commit -m "srv ${VERSION}"
          git push
