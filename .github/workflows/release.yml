name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Test
        run: |
          just mkcert
          go test ./...

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildDate=${BUILD_DATE}"

          mkdir -p dist
          mkdir -p internal/mkcert/bin

          # Generate version file once before the loop
          MKCERT_VERSION=$(git -C third_party/mkcert describe --tags 2>/dev/null || echo "unknown")
          printf '// Code generated by make mkcert — do not edit.\npackage mkcert\n\n// Version is the version of the embedded mkcert binary.\nconst Version = "%s"\n' \
            "$MKCERT_VERSION" > internal/mkcert/version.go

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "linux/arm/7"
            "linux/386"
            "darwin/amd64"
            "darwin/arm64"
          )

          for platform in "${platforms[@]}"; do
            IFS='/' read -r GOOS GOARCH GOARM <<< "$platform"

            output_name="srv-${GOOS}-${GOARCH}"
            if [ -n "$GOARM" ]; then
              output_name="srv-${GOOS}-${GOARCH}v${GOARM}"
            fi

            echo "Building ${output_name}..."

            # Build mkcert for this target platform, then srv.
            (cd third_party/mkcert && env CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" GOARM="$GOARM" \
              go build -ldflags "-X main.Version=${MKCERT_VERSION}" \
              -o ../../internal/mkcert/bin/mkcert .)

            env CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" GOARM="$GOARM" \
              go build -ldflags "$LDFLAGS" -trimpath -o "dist/${output_name}" .
          done

          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
